name: SpeedMath Coach Android Release AAB

on:
  workflow_dispatch:

jobs:
  build-android-aab:
    name: Build signed Android AAB
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Build Vite app
        run: npm run build

      - name: Generate Capacitor assets
        run: npx @capacitor/assets generate

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Decode Android release keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p android/app/keystore
          printf "%s" "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/keystore/release.jks
          chmod 600 android/app/keystore/release.jks

      - name: Build signed release AAB
        working-directory: android
        shell: bash
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          ./gradlew :app:bundleRelease \
            -Pandroid.injected.signing.store.file="$PWD/app/keystore/release.jks" \
            -Pandroid.injected.signing.store.password="$ANDROID_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD"

      - name: Verify signed AAB
        run: jarsigner -verify -verbose -certs android/app/build/outputs/bundle/release/app-release.aab

      - name: Upload Android AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpeedMathCoach-Android-v1.1.0-build4
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
