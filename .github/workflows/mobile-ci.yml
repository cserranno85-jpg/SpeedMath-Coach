name: SpeedMath Coach Mobile CI

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - speedmath-coach-external-gradle-build-v1

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GRADLE_VERSION: 8.14.3

jobs:
  validate-mobile-project:
    name: Validate mobile project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up Java 21 for Android tooling
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Generate SpeedMath Coach brand assets
        run: npm run generate:brand-assets

      - name: Build Vite app
        run: npm run build

      - name: Generate Capacitor native assets
        run: npx @capacitor/assets generate

      - name: Sync Android Capacitor project
        run: npx cap sync android

      - name: Build Android debug APK with external Gradle
        shell: bash
        run: |
          set -euo pipefail
          curl -L -o gradle.zip "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip"
          unzip -q gradle.zip
          "./gradle-${GRADLE_VERSION}/bin/gradle" -p android :app:assembleDebug --stacktrace

      - name: Verify PNG signatures after asset generation
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const root = process.cwd();
          const skipDirNames = new Set([
            'node_modules',
            '.git',
            'dist',
            'build',
            '.gradle',
          ]);

          const bad = [];
          let count = 0;

          function walk(dir) {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const full = path.join(dir, entry.name);

              if (entry.isDirectory()) {
                if (skipDirNames.has(entry.name)) {
                  continue;
                }

                walk(full);
                continue;
              }

              if (!entry.isFile()) {
                continue;
              }

              if (!entry.name.toLowerCase().endsWith('.png')) {
                continue;
              }

              count += 1;

              const buf = fs.readFileSync(full);
              const valid =
                buf.length >= 8 &&
                buf[0] === 0x89 &&
                buf[1] === 0x50 &&
                buf[2] === 0x4e &&
                buf[3] === 0x47 &&
                buf[4] === 0x0d &&
                buf[5] === 0x0a &&
                buf[6] === 0x1a &&
                buf[7] === 0x0a;

              if (!valid) {
                bad.push(path.relative(root, full));
              }
            }
          }

          walk(root);

          console.log(`PNG files checked: ${count}`);

          if (bad.length) {
            console.error('Invalid PNG files found:');
            for (const file of bad) {
              console.error(`- ${file}`);
            }
            process.exit(1);
          }

          console.log('All checked PNG files have valid PNG signatures.');
          NODE

      - name: Normalize generated PWA manifest icons back to PNG
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'src/manifest.webmanifest';

          const raw = fs.readFileSync(path, 'utf8').replace(/^\uFEFF/, '');
          const manifest = JSON.parse(raw);

          if (Array.isArray(manifest.icons)) {
            for (const icon of manifest.icons) {
              if (typeof icon.src === 'string') {
                icon.src = icon.src.replace(/\.webp$/i, '.png');
                icon.type = 'image/png';
              }
            }
          }

          fs.writeFileSync(path, JSON.stringify(manifest, null, 2) + '\n', 'utf8');
          NODE

          rm -f src/assets/icons/*.webp


      - name: Run mobile readiness verifier
        run: npm run verify:mobile

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: speedmath-coach-dist
          path: dist
          if-no-files-found: error

      - name: Upload Android debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: speedmath-coach-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

