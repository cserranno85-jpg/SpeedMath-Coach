name: SpeedMath Coach Mobile CI

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - speedmath-coach-external-gradle-build-v1

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GRADLE_VERSION: 8.14.3

jobs:
  validate-mobile-project:
    name: Validate mobile project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up Java for Android tooling
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Generate SpeedMath Coach brand assets
        run: npm run generate:brand-assets

      - name: Build Vite app
        run: npm run build

      - name: Generate Capacitor native assets
        run: npx @capacitor/assets generate

      - name: Sync Android Capacitor project
        run: npx cap sync android

      - name: Build Android debug APK with external Gradle
        shell: bash
        run: |
          set -euo pipefail
          curl -L -o gradle.zip "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip"
          unzip -q gradle.zip
          "./gradle-${GRADLE_VERSION}/bin/gradle" -p android :app:assembleDebug --stacktrace

      - name: Verify PNG signatures after asset generation
        shell: bash
        run: |
          node -e "const fs=require('fs');const path=require('path');const root=process.cwd();const bad=[];let count=0;function walk(dir){for(const e of fs.readdirSync(dir,{withFileTypes:true})){const f=path.join(dir,e.name);if(f.includes(`${path.sep}node_modules${path.sep}`)||f.includes(`${path.sep}.git${path.sep}`)||f.includes(`${path.sep}dist${path.sep}`)||f.includes(`${path.sep}build${path.sep}`))continue;if(e.isDirectory())walk(f);else if(e.isFile()&&e.name.toLowerCase().endsWith('.png')){count++;const b=fs.readFileSync(f);const ok=b.length>=8&&b[0]===0x89&&b[1]===0x50&&b[2]===0x4e&&b[3]===0x47&&b[4]===0x0d&&b[5]===0x0a&&b[6]===0x1a&&b[7]===0x0a;if(!ok)bad.push(f)}}}walk(root);console.log('PNG files checked: '+count);if(bad.length){console.error('Invalid PNG files found:');bad.forEach(f=>console.error('- '+path.relative(root,f)));process.exit(1)}console.log('All PNG files have valid PNG signatures.');"

      - name: Run mobile readiness verifier
        run: npm run verify:mobile

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: speedmath-coach-dist
          path: dist
          if-no-files-found: error

      - name: Upload Android debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: speedmath-coach-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
