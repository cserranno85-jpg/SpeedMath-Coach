name: SpeedMath Coach iOS Archive

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: Build signed iOS IPA
    runs-on: macos-26

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      APP_IDENTIFIER: com.caivratech.speedmathcoach
      TEAM_ID: MP9Y62B4LR
      PROFILE_NAME: SpeedMath Coach App Store Profile
      SCHEME: App
      PROJECT_PATH: ios/App/App.xcodeproj
      ARCHIVE_PATH: build/SpeedMathCoach.xcarchive
      EXPORT_PATH: build/export
      KEYCHAIN_PATH: build.keychain-db

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Confirm Xcode and SDK versions
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Install dependencies
        run: npm install

      - name: Build Vite app
        run: npm run build

      - name: Sync Capacitor iOS project
        run: npx cap sync ios

      - name: Install CocoaPods dependencies if Podfile exists
        working-directory: ios/App
        run: |
          if [ -f "Podfile" ]; then
            pod install
          else
            echo "No Podfile found. Skipping CocoaPods install."
          fi

      - name: Prepare signing files
        shell: bash
        env:
          IOS_DIST_CERT_P12_BASE64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
          IOS_DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p build

          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          def decode_secret(name, output_path):
              raw = os.environ.get(name, "")
              cleaned = "".join(raw.split())
              if not cleaned:
                  raise SystemExit(f"{name} is empty or missing")
              data = base64.b64decode(cleaned, validate=True)
              Path(output_path).write_bytes(data)
              print(f"Wrote {output_path}: {len(data)} bytes")

          decode_secret("IOS_DIST_CERT_P12_BASE64", "build/ios_distribution.p12")
          decode_secret("IOS_PROVISION_PROFILE_BASE64", "build/profile.mobileprovision")
          PY

          security cms -D -i build/profile.mobileprovision > build/profile.plist
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" build/profile.plist)
          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"

          cp build/profile.mobileprovision "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"


          security import build/ios_distribution.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$IOS_DIST_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Create ExportOptions.plist
        shell: bash
        run: |
          set -euo pipefail

          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${APP_IDENTIFIER}</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Archive iOS app
        run: |
          set -euo pipefail

          xcodebuild archive \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$APP_IDENTIFIER" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            CURRENT_PROJECT_VERSION=3 \
            MARKETING_VERSION=1.1.1 \
            clean archive

      - name: Export IPA
        run: |
          set -euo pipefail

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist ExportOptions.plist

          find "$EXPORT_PATH" -maxdepth 2 -type f -print

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpeedMathCoach-iOS-v1.1.1-build3
          path: build/export/*.ipa
          if-no-files-found: error

      - name: Upload IPA to TestFlight
        shell: bash
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
        run: |
          set -euo pipefail

          IPA_PATH=$(find build/export -name "*.ipa" -type f | head -n 1)

          if [ -z "$IPA_PATH" ]; then
            echo "No IPA found in build/export"
            exit 1
          fi

          KEY_ID="$(printf "%s" "$APP_STORE_CONNECT_KEY_ID" | tr -d "[:space:]")"
          ISSUER_ID="$(printf "%s" "$APP_STORE_CONNECT_ISSUER_ID" | tr -d "[:space:]")"
          KEY_FILE="AuthKey_${KEY_ID}.p8"

          echo "Key ID length: ${#KEY_ID}"
          echo "Issuer ID length: ${#ISSUER_ID}"

          mkdir -p \
            "$PWD/private_keys" \
            "$HOME/private_keys" \
            "$HOME/.private_keys" \
            "$HOME/.appstoreconnect/private_keys"

          printf "%s" "$APP_STORE_CONNECT_API_KEY_P8" > "$PWD/private_keys/$KEY_FILE"

          cp "$PWD/private_keys/$KEY_FILE" "$HOME/private_keys/$KEY_FILE"
          cp "$PWD/private_keys/$KEY_FILE" "$HOME/.private_keys/$KEY_FILE"
          cp "$PWD/private_keys/$KEY_FILE" "$HOME/.appstoreconnect/private_keys/$KEY_FILE"

          chmod 600 "$PWD/private_keys/$KEY_FILE"
          chmod 600 "$HOME/private_keys/$KEY_FILE"
          chmod 600 "$HOME/.private_keys/$KEY_FILE"
          chmod 600 "$HOME/.appstoreconnect/private_keys/$KEY_FILE"

          echo "AuthKey file locations:"
          ls -la "$PWD/private_keys/$KEY_FILE"
          ls -la "$HOME/private_keys/$KEY_FILE"
          ls -la "$HOME/.private_keys/$KEY_FILE"
          ls -la "$HOME/.appstoreconnect/private_keys/$KEY_FILE"

          echo "Uploading IPA to TestFlight: $IPA_PATH"

          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$KEY_ID" \
            --apiIssuer "$ISSUER_ID"


